name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-android-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-android-gradle-
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6
          npx cap init PSXTracker com.psxtracker.app --web-dir templates
          npx cap add android
          cp templates/mobile.html android/app/src/main/assets/index.html
          cd android
          ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: psx-tracker-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk